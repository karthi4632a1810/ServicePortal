# Production — dedicated VPS with nginx reverse proxy
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Optional Caddy auto-SSL: docker compose ... --profile caddy up -d  (disable nginx first)

services:
  frontend:
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: paperzero-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    profiles: ["caddy"]
    image: caddy:2-alpine
    container_name: paperzero-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env e.g. paper.mapims.edu.in}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started

  seed:
    env_file:
      - path: .env
        required: false
      - path: backend/.env
        required: false

volumes:
  caddy_data:
  caddy_config:
