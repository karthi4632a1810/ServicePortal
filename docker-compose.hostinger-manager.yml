# Hostinger Docker Manager + Traefik (run from project root)
# Usage:
#   docker compose -f docker-compose.hostinger-manager.yml up -d --build
#
# Requires Traefik project in Docker Manager (traefik-proxy network)
# DNS: paper.mapims.edu.in → your VPS IP

services:
  mongo:
    image: mongo:7
    container_name: paperzero-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: paperzero-backend
    restart: unless-stopped
    env_file:
      - .env
      - backend/.env
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/service_portal
      JWT_SECRET: ${JWT_SECRET:-service-portal-docker-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://paper.mapims.edu.in}
      HRMS_DB_HOST: ${HRMS_DB_HOST:-}
      HRMS_DB_PORT: ${HRMS_DB_PORT:-3306}
      HRMS_DB_USER: ${HRMS_DB_USER:-}
      HRMS_DB_PASSWORD: ${HRMS_DB_PASSWORD:-}
      HRMS_DB_NAME: ${HRMS_DB_NAME:-}
      HRMS_DB_TABLE: ${HRMS_DB_TABLE:-staff_profile_tb}
      DEFAULT_EMPLOYEE_PASSWORD: ${DEFAULT_EMPLOYEE_PASSWORD:-mapims}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: paperzero-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: paperzero-nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./deploy/nginx.hostinger.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.paperzero.rule=Host(`paper.mapims.edu.in`)
      - traefik.http.routers.paperzero.entrypoints=websecure
      - traefik.http.routers.paperzero.tls.certresolver=letsencrypt
      - traefik.http.services.paperzero.loadbalancer.server.port=80
      - traefik.http.routers.paperzero-http.rule=Host(`paper.mapims.edu.in`)
      - traefik.http.routers.paperzero-http.entrypoints=web
      - traefik.http.routers.paperzero-http.middlewares=paperzero-redirect-https
      - traefik.http.middlewares.paperzero-redirect-https.redirectscheme.scheme=https
    networks:
      - default
      - traefik-proxy

volumes:
  mongo_data:
  uploads_data:

networks:
  traefik-proxy:
    external: true
