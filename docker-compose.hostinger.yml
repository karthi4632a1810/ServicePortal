# Hostinger shared VPS — nginx on APP_PORT + Traefik domain routing
# Usage: docker compose -f docker-compose.yml -f docker-compose.hostinger.yml up -d --build
#
# Requires Traefik project in Docker Manager (traefik-proxy network)
# DNS: paper.mapims.edu.in → VPS IP

services:
  frontend:
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: paperzero-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8093}:80"
    volumes:
      - ./deploy/nginx.hostinger.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.paperzero.rule=Host(`paper.mapims.edu.in`)
      - traefik.http.routers.paperzero.entrypoints=websecure
      - traefik.http.routers.paperzero.tls.certresolver=letsencrypt
      - traefik.http.services.paperzero.loadbalancer.server.port=80
      - traefik.http.routers.paperzero-http.rule=Host(`paper.mapims.edu.in`)
      - traefik.http.routers.paperzero-http.entrypoints=web
      - traefik.http.routers.paperzero-http.middlewares=paperzero-redirect-https
      - traefik.http.middlewares.paperzero-redirect-https.redirectscheme.scheme=https
    networks:
      - default
      - traefik-proxy

  seed:
    env_file:
      - path: .env
        required: false
      - path: backend/.env
        required: false

networks:
  traefik-proxy:
    external: true
