# Host nginx config for paper.mapims.edu.in (shared VPS — same pattern as tms, feedback, pg)
# Install on VPS:
#   sudo cp deploy/nginx/paper.mapims.edu.in.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/paper.mapims.edu.in.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requires PaperZero nginx on host port 8093 (docker-compose.hostinger.yml)

server {
    listen 80;
    server_name paper.mapims.edu.in;

    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:8093;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# HTTPS — after certbot:
#   sudo certbot --nginx -d paper.mapims.edu.in
# Certbot will add listen 443 ssl and certificate paths automatically.
